<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Boomm CMS</title>

    <script>
      window.CMS_MANUAL_INIT = true;
    </script>

    <script src="https://unpkg.com/decap-cms@^3/dist/decap-cms.js"></script>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  </head>

  <body>
    <script>
      window.addEventListener("load", function () {
        CMS.init({
          config: "/admin/config.yml",
        });
      });

      if (window.netlifyIdentity) {
        window.netlifyIdentity.on("init", (user) => {
          if (!user) {
            window.netlifyIdentity.on("login", () => {
              document.location.href = "/admin/";
            });
          }
        });

        // Handle invite / confirmation / recovery tokens
        const hash = window.location.hash;

        if (
          hash &&
          (hash.includes("confirmation_token") ||
            hash.includes("invite_token") ||
            hash.includes("recovery_token"))
        ) {
          window.netlifyIdentity.open();
        }

        // Smooth auth flow after signup / confirm
        window.netlifyIdentity.on("signup", () => {
          window.netlifyIdentity.open("login");
        });

        window.netlifyIdentity.on("confirm", () => {
          window.netlifyIdentity.open("login");
        });
      }
    </script>
  </body>
</html>
