<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Boomm CMS</title>

    <script>
      window.CMS_MANUAL_INIT = true;
    </script>

    <script src="https://unpkg.com/decap-cms@^3/dist/decap-cms.js"></script>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  </head>

  <body>
    <script>
      window.addEventListener("load", function () {
        CMS.init({
          config: "/admin/config.yml",
        });
      });

      if (window.netlifyIdentity) {
        window.netlifyIdentity.on("init", (user) => {
          if (!user) {
            window.netlifyIdentity.on("login", () => {
              document.location.href = "/admin/";
            });
          }
        });

        // Handle invite / confirmation / recovery tokens
        const hash = window.location.hash;

        if (hash) {
          // Invite flow → show signup/password creation screen
          if (hash.includes("invite_token")) {
            window.netlifyIdentity.open("signup");
          }

          // Password reset flow
          if (hash.includes("recovery_token")) {
            window.netlifyIdentity.open("recovery");
          }

          // Email confirmation flow
          if (hash.includes("confirmation_token")) {
            window.netlifyIdentity.open("login");
          }
        }

        // Smooth auth flow after signup / confirm
        window.netlifyIdentity.on("signup", () => {
          window.netlifyIdentity.open("login");
        });

        window.netlifyIdentity.on("confirm", () => {
          window.netlifyIdentity.open("login");
        });

        // After password recovery, redirect back to admin
        window.netlifyIdentity.on("recovery", () => {
          document.location.href = "/admin/";
        });

        // After logout, stay on admin login screen
        window.netlifyIdentity.on("logout", () => {
          document.location.href = "/admin/";
        });
      }
    </script>
  </body>
</html>
